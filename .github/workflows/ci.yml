name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    name: Shell smoke tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        run: bash test/smoke.sh
