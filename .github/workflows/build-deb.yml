name: Build Release Deb

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create .deb package
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
      run: |
        PKG_DIR="system-suite_${VERSION}_all"
        mkdir -p "${PKG_DIR}/DEBIAN" "${PKG_DIR}/usr/bin" "${PKG_DIR}/usr/share/doc/system-suite"

        install -m 0755 system_suite.sh "${PKG_DIR}/usr/bin/system-suite"
        install -m 0644 README.md LICENSE "${PKG_DIR}/usr/share/doc/system-suite/"

        cat > "${PKG_DIR}/DEBIAN/control" << EOF
        Package: system-suite
        Version: ${VERSION}
        Section: utils
        Priority: optional
        Architecture: all
        Maintainer: hamimLohani <hamimlohani@gmail.com>
        Depends: bash (>= 4.0), curl
        Homepage: https://github.com/hamimLohani/system_suite
        Description: Terminal-based system maintenance and monitoring toolkit
         A comprehensive system maintenance and monitoring toolkit for macOS, Linux,
         and Unix-like systems. Provides system monitoring, disk cleanup, package
         updates, network speed testing, file management, and more.
        EOF
        sed -i 's/^        //' "${PKG_DIR}/DEBIAN/control"

        dpkg-deb --build "${PKG_DIR}"

    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          system-suite_${{ steps.version.outputs.VERSION }}_all.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
