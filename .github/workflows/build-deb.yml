name: Build and Upload to PPA

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y devscripts build-essential debhelper dh-make

    - name: Setup GPG key
      run: |
        mkdir -p ~/.gnupg
        chmod 700 ~/.gnupg
        echo "use-agent" >> ~/.gnupg/gpg.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        echo "test" | gpg --batch --yes --passphrase "${{ secrets.GPG_PASSPHRASE }}" --pinentry-mode loopback --sign > /dev/null

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create .deb package
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
        MAINTAINER_NAME: ${{ secrets.MAINTAINER_NAME }}
        MAINTAINER_EMAIL: ${{ secrets.MAINTAINER_EMAIL }}
      run: |
        PKG="system-suite-${VERSION}"
        mkdir -p "${PKG}"
        cp system_suite.sh "${PKG}/"
        cp README.md "${PKG}/"
        cd "${PKG}"

        # Init debian dir
        dh_make --single --native --copyright mit \
          --email "${MAINTAINER_EMAIL}" --yes || true

        # control file (no leading spaces)
        cat > debian/control << EOF
        Source: system-suite
        Section: utils
        Priority: optional
        Maintainer: ${MAINTAINER_NAME} <${MAINTAINER_EMAIL}>
        Build-Depends: debhelper-compat (= 13)
        Standards-Version: 4.6.0
        Homepage: https://github.com/hamim-24/system_suite

        Package: system-suite
        Architecture: all
        Depends: bash (>= 4.0), curl
        Description: Terminal-based system maintenance and monitoring toolkit
         A comprehensive system maintenance and monitoring toolkit for macOS, Linux,
         and Unix-like systems. Provides system monitoring, disk cleanup, package
         updates, network speed testing, file management, and more.
        EOF
        # Remove leading whitespace from control file
        sed -i 's/^        //' debian/control

        # install file
        echo "system_suite.sh usr/bin/system-suite" > debian/install

        # changelog
        cat > debian/changelog << EOF
        system-suite (${VERSION}-1) stable; urgency=medium

          * New upstream release ${VERSION}

         -- ${MAINTAINER_NAME} <${MAINTAINER_EMAIL}>  $(date -R)
        EOF

        # Build binary .deb (no signing needed for release assets)
        debuild -b -uc -us

    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          system-suite_${{ steps.version.outputs.VERSION }}-1_all.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
